name: dart_metaflac
description: A pure Dart implementation of metaflac for reading and writing FLAC metadata. No dart:io dependency in core — works with Dart, Flutter, and web applications.
version: 0.0.1
repository: https://github.com/bovinemagnet/dart-metaflac
homepage: https://github.com/bovinemagnet/dart-metaflac
issue_tracker: https://github.com/bovinemagnet/dart-metaflac/issues
topics:
  - flac
  - metadata
  - audio
  - tags
  - vorbis-comments

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  args: ^2.4.0

dev_dependencies:
  lints: ^6.0.0
  test: ^1.24.0

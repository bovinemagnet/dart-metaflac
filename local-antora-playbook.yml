antora:
  extensions:
    - require: "@antora/lunr-extension"
      index_latest_only: true
    - require: "@sntke/antora-mermaid-extension"
      mermaid_library_url: https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs
      script_stem: header-scripts
      mermaid_initialize_options:
        start_on_load: true
runtime:
  cache_dir: ./.cache/antora
  log:
    failure_level: warn
site:
  title: dart_metaflac Documentation
  start_page: dart-metaflac::index.adoc
  robots: deny
git:
  ensure_git_suffix: false
content:
  sources:
    - url: .
      start_path: src/docs
      branches: HEAD
ui:
  bundle:
    url: https://gitlab.com/antora/antora-ui-default/-/jobs/artifacts/HEAD/raw/build/ui-bundle.zip?job=bundle-stable
    snapshot: true
output:
  clean: true
  dir: ./target/public
asciidoc:
  attributes:
    build-type-local: true
    idprefix: ""
    idseparator: "-"
    experimental: ""

name: dart_metaflac_flutter_example
description: Minimal Flutter example showing how to use dart_metaflac in a Flutter app. Works on mobile, desktop, and web targets.
publish_to: none
version: 0.0.2

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  dart_metaflac:
    path: ../..

flutter:
  uses-material-design: true
  assets:
    - assets/sample.flac
